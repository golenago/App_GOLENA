<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scanner QR</title>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: #000000;
            color: #ffffff;
            overflow: hidden;
        }

        .app-container {
            position: relative;
            width: 100%;
            height: 100%;
        }

        /* ---------------------------------------------------- */
        /* SCHERMATA 1: RICHIESTA ACCESSO FOTOCAMERA            */
        /* ---------------------------------------------------- */
        #screen-permission {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            padding: 24px;
            text-align: center;
            position: absolute;
            width: 100%;
            z-index: 20;
            background-color: #000000;
        }

        .icon-circle {
            width: 150px;
            height: 150px;
            background-color: #e8f5e9;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 40px;
        }

        .icon-circle svg {
            width: 70px;
            height: 70px;
            fill: #81c028;
        }

        #screen-permission .title {
            font-size: 26px;
            font-weight: 700;
            color: #ffffff;
            opacity: 0.35;
            margin-bottom: 16px;
        }

        .description {
            font-size: 16px;
            line-height: 1.5;
            color: #a3a3a3;
            max-width: 300px;
            margin-bottom: 48px;
            font-weight: 400;
        }

        .btn-green {
            width: 100%;
            max-width: 340px;
            background-color: #81c028;
            color: #ffffff;
            border: none;
            border-radius: 14px;
            padding: 16px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 24px;
            transition: background-color 0.2s;
        }

        .btn-green:active {
            background-color: #81c028;
        }

        .btn-link {
            background: none;
            border: none;
            color: #81c028;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
        }

        /* ---------------------------------------------------- */
        /* SCHERMATA 2: INTERFACCIA VIDEO (A TUTTO SCHERMO)     */
        /* ---------------------------------------------------- */
        #screen-scanner {
            display: none;
            flex-direction: column;
            height: 100%;
            width: 100%;
            position: relative;
            background-color: #000;
        }

        .camera-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        #reader {
            width: 100% !important;
            height: 100% !important;
            border: none !important;
        }

        #reader video {
            width: 100% !important;
            height: 100% !important;
            object-fit: cover !important;
        }

        #reader #reader__scan_region,
        #reader__scan_region fieldset,
        #reader__scan_region div,
        #qr-shaded-region {
            border: none !important;
            background: transparent !important;
            background-color: transparent !important;
            box-shadow: none !important;
        }
        #reader img { display: none !important; }

        .floating-header {
            position: absolute;
            top: 28px;
            left: 0;
            width: 100%;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 16px;
            z-index: 10;
            pointer-events: none;
        }

        .btn-back {
            position: absolute;
            left: 20px;
            width: 46px;
            height: 46px;
            background-color: rgba(0, 0, 0, 0.48);
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
        }

        .btn-back i {
            color: #ffffff;
            font-size: 20px;
            display: flex;
        }

        .header-title {
            font-size: 19px;
            font-weight: 600;
            color: #ffffff;
            letter-spacing: -0.3px;
            text-shadow: 0px 1px 4px rgba(0, 0, 0, 0.6);
        }

        .scanner-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }

        .viewfinder-container {
            position: absolute;
            top: 42%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 250px;
            height: 250px;
            background-color: transparent;
        }

        .custom-corner {
            position: absolute;
            width: 35px;
            height: 35px;
            border: 0 solid #81c028;
            transition: border-color 0.3s;
        }

        .tg-top-left {
            top: 0;
            left: 0;
            border-top-width: 5px;
            border-left-width: 5px;
            border-top-left-radius: 20px;
        }

        .tg-top-right {
            top: 0;
            right: 0;
            border-top-width: 5px;
            border-right-width: 5px;
            border-top-right-radius: 20px;
        }

        .tg-bottom-left {
            bottom: 0;
            left: 0;
            border-bottom-width: 5px;
            border-left-width: 5px;
            border-bottom-left-radius: 20px;
        }

        .tg-bottom-right {
            bottom: 0;
            right: 0;
            border-bottom-width: 5px;
            border-right-width: 5px;
            border-bottom-right-radius: 20px;
        }

        .bottom-info {
            position: absolute;
            bottom: 14%;
            left: 0;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 0 40px;
        }

        .qr-icon {
            margin-bottom: 16px;
        }

        .qr-icon i {
            color: #ffffff;
            font-size: 30px;
        }

        .scan-text {
            font-size: 15.5px;
            color: #ffffff;
            font-weight: 400;
            line-height: 1.4;
            text-shadow: 0px 1px 4px rgba(0, 0, 0, 0.7);
        }
    </style>
</head>
<body>

    <div class="app-container">
        
        <div id="screen-permission">
            <div class="icon-circle">
                <svg viewBox="0 0 24 24">
                    <path d="M4 4h3l2-3h6l2 3h3c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2zm8 3c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zm0 8c-1.65 0-3-1.35-3-3s1.35-3 3-3 3 1.35 3 3-1.35 3-3 3z"/>
                </svg>
            </div>
            <h1 class="title">Accesso alla Fotocamera</h1>
            <p class="description">Per aprire le pagine web delle tappe, abbiamo bisogno di accedere alla fotocamera.</p>
            
            <button class="btn-green" id="btn-consent">Consenti Accesso</button>
            <button class="btn-link" id="btn-cancel-permission">Torna Indietro</button>
        </div>

        <div id="screen-scanner">
            
            <div class="floating-header">
                <button class="btn-back" id="btn-back-action">
                    <i class="bi bi-chevron-left"></i>
                </button>
                <div class="header-title">Scansiona QR</div>
            </div>

            <div class="camera-container">
                <div id="reader"></div>
            </div>
            
            <div class="scanner-overlay">
                <div class="viewfinder-container">
                    <div class="custom-corner tg-top-left"></div>
                    <div class="custom-corner tg-top-right"></div>
                    <div class="custom-corner tg-bottom-left"></div>
                    <div class="custom-corner tg-bottom-right"></div>
                </div>

                <div class="bottom-info">
                    <div class="qr-icon" id="status-icon">
                        <i class="bi bi-qr-code"></i>
                    </div>
                    <p class="scan-text" id="status-text">Inquadra il QR code posizionato sulla tappa per aprire la pagina</p>
                </div>
            </div>

        </div>

    </div>

    <script>
        const screenPermission = document.getElementById('screen-permission');
        const screenScanner = document.getElementById('screen-scanner');
        const btnConsent = document.getElementById('btn-consent');
        const btnBackAction = document.getElementById('btn-back-action');
        const btnCancelPermission = document.getElementById('btn-cancel-permission');
        const statusText = document.getElementById('status-text');
        const statusIcon = document.getElementById('status-icon');
        const corners = document.querySelectorAll('.custom-corner');
        
        let html5QrCode;
        let isProcessing = false;

        function startScanner() {
            screenPermission.style.display = 'none';
            screenScanner.style.display = 'flex';

            html5QrCode = new Html5Qrcode('reader');
            const config = { 
                fps: 25, 
                qrbox: { width: 250, height: 250 },
                aspectRatio: window.innerWidth / window.innerHeight
            };

            html5QrCode.start(
                { facingMode: 'environment' }, 
                config,
                (decodedText, decodedResult) => {
                    if (!isProcessing) {
                        gestisciQrScansionato(decodedText);
                    }
                },
                (errorMessage) => {
                    // Silenzioso
                }
            ).catch((err) => {
                console.error('Errore fotocamera:', err);
                alert('Impossibile accedere alla fotocamera.');
                stopScanner();
            });
        }

        function gestisciQrScansionato(valoreQr) {
            isProcessing = true;
            try {
                let audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                let o = audioCtx.createOscillator();
                o.frequency.setValueAtTime(850, audioCtx.currentTime);
                o.connect(audioCtx.destination);
                o.start(); o.stop(audioCtx.currentTime + 0.1);
            } catch(e) {}

            const urlDestinazione = valoreQr.trim();
            if (urlDestinazione.startsWith('http://') || urlDestinazione.startsWith('https://')) {
                statusText.innerText = 'Apertura pagina in corso...';
                statusIcon.innerHTML = '<i class="bi bi-box-arrow-up-right" style="color: #28a745;"></i>';
                corners.forEach(c => c.style.borderColor = '#28a745');

                if (html5QrCode && html5QrCode.isScanning) {
                    html5QrCode.stop().then(() => {
                        window.location.href = urlDestinazione;
                    }).catch(() => {
                        window.location.href = urlDestinazione;
                    });
                } else {
                    window.location.href = urlDestinazione;
                }
            } else {
                statusText.innerText = 'Il codice non contiene un link valido.';
                statusIcon.innerHTML = '<i class="bi bi-exclamation-triangle-fill" style="color: #dc3545;"></i>';
                corners.forEach(c => c.style.borderColor = '#dc3545');
                console.log('Contenuto QR non supportato:', urlDestinazione);
                setTimeout(() => {
                    statusText.innerText = 'Inquadra il QR code posizionato sulla tappa per aprire la pagina';
                    statusIcon.innerHTML = '<i class="bi bi-qr-code"></i>';
                    corners.forEach(c => c.style.borderColor = '#81c028');
                    isProcessing = false;
                }, 3000);
            }
        }

        function stopScanner() {
            if (html5QrCode && html5QrCode.isScanning) {
                html5QrCode.stop().then(() => {
                    screenScanner.style.display = 'none';
                    screenPermission.style.display = 'flex';
                }).catch((err) => console.error(err));
            } else {
                screenScanner.style.display = 'none';
                screenPermission.style.display = 'flex';
            }
        }

        btnConsent.addEventListener('click', startScanner);
        btnBackAction.addEventListener('click', () => {
            stopScanner();
            window.location.href = 'index.html';
        });
        
        btnCancelPermission.addEventListener('click', () => {
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
